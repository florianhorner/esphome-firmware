name: Build ESPHome Firmware

on:
  push:
    branches: [main]
    paths:
      - "*.yaml"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "*.yaml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file:
          - ble-proxy.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy secrets
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "test"
          wifi_password: "test1234"
          api_encryption_key: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleTE="
          ota_password: "test"
          EOF

      - name: Build firmware
        uses: esphome/build-action@v4
        id: esphome-build
        with:
          yaml-file: ${{ matrix.file }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.file }}
          path: ${{ steps.esphome-build.outputs.name }}
